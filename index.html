<!DOCTYPE html>
<html>
<head>
  <title>Clever | Portal</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #f2f2f2;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 10000;
      font-family: Arial, sans-serif;
    }

    #topbar img {
      height: 40px;
      margin-right: 12px;
    }

    #topbar a {
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: 500;
    }

    #topbar a:hover {
      text-decoration: underline;
    }

    /* Fullscreen iframe under the bar */
    #gameframe {
      position: fixed;
      top: 60px;
      left: 0;
      width: 100%;
      height: calc(100% - 60px);
      border: none;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
    <a href="https://sites.google.com/view/bobsgwebsite/home" target="_blank">Clever | Portal</a>
  </div>

  <iframe id="gameframe" src="https://bloxd.io"></iframe>

</body>
</html>
